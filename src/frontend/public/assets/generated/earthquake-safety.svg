<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b0f14"/>
      <stop offset="1" stop-color="#121826"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff4b3a" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ff8a2a" stop-opacity="0.65"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <path d="M0,540 C180,500 260,620 420,560 C560,508 660,620 840,560 C980,510 1080,540 1200,520 L1200,800 L0,800 Z" fill="#0b0f18"/>

  <g opacity="0.9">
    <circle cx="220" cy="190" r="110" fill="url(#accent)" filter="url(#soft)"/>
    <circle cx="980" cy="240" r="140" fill="#7a5cff" opacity="0.35" filter="url(#soft)"/>
  </g>

  <g transform="translate(120 180)">
    <rect x="0" y="0" width="520" height="440" rx="28" fill="#161d28" stroke="#2a3342"/>
    <path d="M80,320 L220,180 L320,260 L450,120" fill="none" stroke="#ff4b3a" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M80,320 L450,320" stroke="#2a3342" stroke-width="6" stroke-linecap="round"/>
    <path d="M80,120 L450,120" stroke="#2a3342" stroke-width="6" stroke-linecap="round"/>
    <text x="80" y="86" fill="#f2f5f8" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="34" font-weight="800">Earthquake</text>
    <text x="80" y="150" fill="#a3adb9" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="22">Drop " Cover " Hold On</text>
  </g>

  <g transform="translate(720 250)">
    <rect x="0" y="0" width="380" height="300" rx="26" fill="#0f1623" stroke="#2a3342"/>
    <path d="M70,80 L310,80" stroke="#2a3342" stroke-width="8" stroke-linecap="round"/>
    <path d="M70,150 L310,150" stroke="#2a3342" stroke-width="8" stroke-linecap="round"/>
    <path d="M70,220 L240,220" stroke="#2a3342" stroke-width="8" stroke-linecap="round"/>
    <path d="M310,220 l24,24" stroke="#ff4b3a" stroke-width="10" stroke-linecap="round"/>
    <path d="M334,220 l-24,24" stroke="#ff4b3a" stroke-width="10" stroke-linecap="round"/>
    <text x="70" y="52" fill="#ff4b3a" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="18" font-weight="800" letter-spacing="3">SAFETY</text>
  </g>
