<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a0f10"/>
      <stop offset="1" stop-color="#121826"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff8a2a"/>
      <stop offset="1" stop-color="#ff3d2e"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <g opacity="0.25">
    <circle cx="260" cy="230" r="140" fill="#ff5a3c"/>
    <circle cx="980" cy="240" r="170" fill="#7a5cff"/>
  </g>

  <g transform="translate(140 170)">
    <rect x="0" y="0" width="560" height="460" rx="28" fill="#161d28" stroke="#2a3342"/>
    <text x="86" y="92" fill="#f2f5f8" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="36" font-weight="800">Fire</text>
    <text x="86" y="152" fill="#a3adb9" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="22">Evacuate fast " Stay low</text>

    <g filter="url(#glow)">
      <path d="M280,400
               C220,360 220,300 260,260
               C250,330 310,330 300,250
               C360,290 390,330 370,380
               C350,430 310,440 280,400 Z"
            fill="url(#flame)"/>
      <path d="M285,380
               C255,360 255,330 275,305
               C272,345 305,340 298,300
               C330,325 345,350 335,372
               C325,395 305,398 285,380 Z"
            fill="#ffd34a" opacity="0.85"/>
    </g>

    <path d="M86,360 L500,360" stroke="#2a3342" stroke-width="8" stroke-linecap="round"/>
    <path d="M86,410 L420,410" stroke="#2a3342" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g transform="translate(770 260)">
    <rect x="0" y="0" width="350" height="280" rx="26" fill="#0f1623" stroke="#2a3342"/>
    <text x="58" y="58" fill="#ff8a2a" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="18" font-weight="800" letter-spacing="3">ALERT</text>
    <text x="58" y="110" fill="#a3adb9" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="18">Do not re-enter.</text>
    <text x="58" y="142" fill="#a3adb9" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="18">Call 101 when safe.</text>
  </g>
</svg>

