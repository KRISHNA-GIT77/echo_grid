<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1a22"/>
      <stop offset="1" stop-color="#121826"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2da8ff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#4e6bff" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="260" cy="220" r="130" fill="#2da8ff" opacity="0.25" filter="url(#soft)"/>
  <circle cx="980" cy="210" r="150" fill="#7a5cff" opacity="0.22" filter="url(#soft)"/>

  <path d="M0,560 C140,500 260,640 420,580 C580,520 700,660 860,590 C1020,520 1100,560 1200,540 L1200,800 L0,800 Z" fill="url(#water)"/>
  <path d="M0,620 C160,560 280,700 440,640 C600,580 720,720 880,650 C1040,590 1120,620 1200,600 L1200,800 L0,800 Z" fill="#2da8ff" opacity="0.28"/>

  <g transform="translate(130 160)">
    <rect x="0" y="0" width="560" height="460" rx="28" fill="#161d28" stroke="#2a3342"/>
    <text x="84" y="92" fill="#f2f5f8" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="36" font-weight="800">Flood</text>
    <text x="84" y="152" fill="#a3adb9" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="22">Move to higher ground</text>
    <path d="M84,220 C150,190 210,250 276,220 C342,190 402,250 468,220" fill="none" stroke="#2da8ff" stroke-width="10" stroke-linecap="round"/>
    <path d="M84,280 C150,250 210,310 276,280 C342,250 402,310 468,280" fill="none" stroke="#2da8ff" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
    <path d="M84,340 C150,310 210,370 276,340 C342,310 402,370 468,340" fill="none" stroke="#2da8ff" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
    <path d="M420,180 l60,-70 l60,70" fill="none" stroke="#4e6bff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>

